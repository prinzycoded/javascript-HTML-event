<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Press Display</title>
</head>
<body>
    <p id="keyText">Press key..</p>

  <script>
    const paragraph = document.getElementById("keyText");

    document.addEventListener("keydown", function(event) {
      paragraph.textContent = "press key: " + event.key;
    });
  </script>
    
</body>
</html>
